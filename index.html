<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Recipe Manager</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Personal Recipe Manager</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search recipes by name or ingredients...">
            <button id="clearSearch">Clear</button>
            <button id="shuffleButton">Shuffle</button>
        </div>
        <div class="selection-controls">
            <button id="selectModeButton">Select Recipes</button>
            <button id="viewShoppingListButton" class="hidden">View Shopping List (0)</button>
            <button id="clearSelectionsButton" class="hidden">Clear Selections</button>
        </div>
    </header>

    <main>
        <div id="recipeGrid" class="recipe-grid">
            <!-- Recipes will be loaded here -->
        </div>
        
        <div id="recipeDetail" class="recipe-detail hidden">
            <button id="backButton">← Back to Recipes</button>
            <div id="recipeContent">
                <!-- Recipe details will be loaded here -->
            </div>
        </div>
        
        <div id="shoppingList" class="shopping-list hidden">
            <button id="backFromShoppingButton">← Back to Recipes</button>
            <div id="shoppingListContent">
                <!-- Shopping list will be loaded here -->
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/search.js"></script>
    <script src="js/recipe-display.js"></script>
</body>
</html>
